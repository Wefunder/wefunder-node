name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  generated-in-sync:
    name: generated code matches spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate
      # The committed src/generated must match what the spec regenerates. If this
      # fails, run `npm run generate` and commit the result.
      - run: git diff --exit-code -- src/generated

  e2e:
    name: live sandbox e2e
    # Never on pull_request: keeps the sandbox secret away from fork PRs.
    # Runs on push to main and manual dispatch; auto-skips if the secret is unset.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      WEFUNDER_CLIENT_ID: ${{ secrets.WEFUNDER_CLIENT_ID }}
      WEFUNDER_CLIENT_SECRET: ${{ secrets.WEFUNDER_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
