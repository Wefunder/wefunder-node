name: Release

# Publishes to npm when a version tag is pushed. Release flow:
#   npm version prerelease --preid beta   # bumps package.json + creates tag v0.1.0-beta.N
#   git push --follow-tags                # this workflow takes it from here
#
# Auth is npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret to store/rotate/leak.
# The package on npm is configured to trust this repo + workflow; npm exchanges the
# GitHub OIDC token (id-token: write) for a short-lived credential at publish time,
# and provenance is generated automatically. One-time npm setup: package → Settings →
# Trusted Publishing → GitHub Actions (repo Wefunder/wefunder-node, workflow release.yml).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # OIDC: trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci

      # Guard: the pushed tag must match package.json (v0.1.0-beta.2 ⇄ 0.1.0-beta.2),
      # so a stray tag can't publish a mismatched version. Exposes VERSION downstream.
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($TAG) != package.json version ($PKG)"
            exit 1
          fi
          echo "VERSION=$PKG" >> "$GITHUB_ENV"

      # publish runs prepublishOnly (typecheck + test + build) as the release gate.
      # No token: npm authenticates via OIDC (trusted publishing) and auto-generates
      # provenance. --access public for the scoped package.
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

      # `npm publish` set the `latest` dist-tag. While pre-GA, also point `beta` at this
      # release so `@beta` tracks the newest prerelease (skipped for stable versions).
      # Uses the same OIDC trusted-publishing auth as the publish above.
      - name: Keep `beta` dist-tag current (prereleases only)
        if: contains(env.VERSION, '-')
        run: npm dist-tag add "@wefunder/sdk@${VERSION}" beta
