      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          example: https://partner.com/webhooks/wefunder
        events:
          type: array
          items:
            type: string
          example:
            - spv.opened
            - spv.closed
            - investment.created
            - investment.confirmed
    PartnerWebhookSubscription:
      type: object
      properties:
        id:
          type: string
          example: whs_abc123
        type:
          type: string
          example: webhook_subscription
        attributes:
          type: object
          properties:
            url:
              type: string
              example: https://partner.com/webhooks/wefunder
            events:
              type: array
              items:
                type: string
              example:
                - spv.opened
                - spv.closed
            active:
              type: boolean
              example: true
            created_at:
              type: string
              format: date-time
              example: '2025-01-15T10:00:00Z'
    PartnerWebhookSubscriptionWithSecret:
      allOf:
        - $ref: '#/components/schemas/PartnerWebhookSubscription'
        - type: object
          properties:
            attributes:
              type: object
              properties:
                secret:
                  type: string
                  description: |
                    The signing secret, shown only once at creation. Used to verify the
                    `X-Wefunder-Signature` header on delivered events.
                  example: whsec_abc123def456
    PartnerWebhookEvent:
      type: object
      description: The payload delivered to a subscribed webhook URL.
      properties:
        id:
          type: string
          example: evt_abc123
        event:
          type: string
          description: |
            The event type. SPV: `spv.created`, `spv.opened`, `spv.updated`,
            `spv.closing`, `spv.closed`, `spv.canceled`. Invites/sessions:
            `invite.created`, `invite.opened`, `invite.invested`, `invite.expired`,
            `investment_session.created`, `investment_session.completed`. Investments:
            `investment.created`, `investment.confirmed`, `investment.canceled`,
            `investment.accreditation_verified`, `investment.accreditation_failed`.
            Disbursement: `disbursement.initiated`, `disbursement.completed`,
            `disbursement.failed`. Plus `webhook.test`.
          example: investment.created
        created_at:
          type: string
          format: date-time
          example: '2025-01-15T15:00:00Z'
        data:
          type: object
          additionalProperties: true
          description: Event-specific payload (e.g. the affected SPV and investment).
        partner_reference:
          type: string
          nullable: true
          description: Echoes the SPV's `metadata.partner_reference` when present.
          example: acme-series-a-2025
  responses:
    Unauthorized:
      description: |
        Authentication required or token is invalid/expired. This error occurs when:
        - No Authorization header is provided
        - The access token is invalid or malformed
        - The access token has expired
        - The access token has been revoked

        To resolve: Obtain a new access token using the OAuth 2.0 flow.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: |
        The authenticated user does not have permission to access this resource.
        This typically means:
        - The user is authenticated but lacks the required OAuth scope
        - The resource belongs to a different user
        - The user's role doesn't allow this operation

        Check that your OAuth token includes the necessary scopes for this endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimitExceeded:
      description: |
        Too many requests in a short time period. The API enforces rate limits to ensure
        fair usage and system stability. When you exceed the limit, you'll receive this
        error along with headers indicating when you can retry.

        Check the `X-RateLimit-Reset` header to know when your limit will reset.
        Consider implementing exponential backoff in your application.
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Request limit per hour
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests
        X-RateLimit-Reset:
          schema:
            type: integer
          description: UTC timestamp when the limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource does not exist or is not visible to this token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: |
        The request conflicts with the resource's current state (for example, opening an
        SPV that is already open, or closing one that is not yet open).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationFailed:
      description: One or more request fields failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    NotImplemented:
      description: |
        This endpoint is defined but not yet implemented. It is published so partners and
        tooling can build against the contract ahead of release.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    SandboxOnly:
      description: |
        This endpoint only works with sandbox (`at_test_`) tokens. It was called with a
        production (`at_live_`) token and refused, because it mints fake investors and money.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
