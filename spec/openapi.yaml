      parameters:
        - $ref: '#/components/parameters/campaign_id'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/utm_source'
        - $ref: '#/components/parameters/utm_campaign'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributionStatsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /campaigns/{campaign_id}/attribution/investments:
    get:
      tags:
        - Attribution
      summary: List attributed investments
      description: |
        Returns a list of attributed investments. The detail level depends on your access:

        **Tier 1 (Marketing Partners)** - Anonymized data:
        - Investor identity represented by opaque tokens (not real IDs)
        - Tokens are campaign-scoped (different token per campaign for same investor)
        - Investment amounts shown as tiers (small/medium/large), not exact values
        - No PII (email, name, address) is returned

        **Tier 2 (Founders/Employees)** - Full data with `detail_level=full`:
        - Real investment IDs (linkable to Wefunder admin)
        - Investor name, email, and username
        - Exact dollar amounts

        **Access**: Requires Tier 1+ access approval from Wefunder admin.
      operationId: listAttributedInvestments
      security:
        - bearerAuth:
            - read:attribution:anonymized
      parameters:
        - $ref: '#/components/parameters/campaign_id'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/start_date'
        - $ref: '#/components/parameters/end_date'
        - $ref: '#/components/parameters/utm_source'
        - $ref: '#/components/parameters/utm_campaign'
        - name: detail_level
          in: query
          description: |
            Level of detail to return:
            - `anonymized` (default): Opaque tokens, amount tiers
            - `full`: Real IDs, exact amounts, investor PII (founders only)

            Marketing partners always receive anonymized data regardless of this parameter.
          schema:
            type: string
            enum:
              - anonymized
              - full
            default: anonymized
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributedInvestmentListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Access denied. This typically means:
            - Your OAuth application hasn't been approved for Tier 1 access
            - Your token doesn't include the `read:attribution:anonymized` scope

            To request Tier 1 access, visit https://wefunder.com/api/request-access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /campaigns/{campaign_id}/attribution/webhooks:
    get:
      tags:
        - Attribution Webhooks
      summary: List attribution webhook subscriptions
      description: |
        Returns all active webhook subscriptions for this campaign belonging to
        your OAuth application.

        **Tier 1** endpoint requiring admin-approved access with the
        `read:attribution:anonymized` scope.
      operationId: listWebhookSubscriptions
      security:
        - bearerAuth:
            - read:attribution:anonymized
      parameters:
        - $ref: '#/components/parameters/campaign_id'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscriptionListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Attribution Webhooks
      summary: Create webhook subscription
      description: |
        Creates a new webhook subscription for this campaign. When attributed
        investments change state, we'll POST a JSON payload to your target URL.

        **Tier 1** endpoint requiring admin-approved access.

        ## Webhook Payload

        Payloads include anonymized data (tokens, amount tiers) matching the
        `/attribution/investments` endpoint.

        ## Security

        - `target_url` must use HTTPS
        - `target_url` cannot resolve to private/internal IPs (SSRF protection)
        - Payloads are signed with HMAC-SHA256 using the returned `secret`

        ## Verification

        Verify webhook signatures using the `X-Wefunder-Signature` header:
        ```
        timestamp = headers['X-Wefunder-Timestamp']
        signature = headers['X-Wefunder-Signature']
        expected = "sha256=" + HMAC-SHA256(secret, timestamp + "." + raw_body)
        ```

        Reject requests where:
        - Signature doesn't match
        - Timestamp is more than 5 minutes old (replay protection)
      operationId: createWebhookSubscription
      security:
        - bearerAuth:
            - read:attribution:anonymized
      parameters:
        - $ref: '#/components/parameters/campaign_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target_url
                - events
              properties:
                target_url:
                  type: string
                  format: uri
                  description: HTTPS URL to receive webhook POSTs
                  example: https://yourapp.com/webhooks/wefunder
                events:
                  type: array
                  description: Events to subscribe to
                  items:
                    type: string
                    enum:
                      - investment.applied
                      - investment.confirmed
                      - investment.canceled
                  example:
                    - investment.applied
                    - investment.confirmed
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscriptionWithSecretEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation error (invalid URL, events, or limit reached)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /campaigns/{campaign_id}/attribution/webhooks/{webhook_id}:
