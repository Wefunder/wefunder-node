      summary: Revoke a partner invite
      description: |
        Revokes a pending invite. Only the creator can revoke an invite.
        Accepted invites cannot be revoked (delete the connection instead).
      operationId: revokePartnerInvite
      security:
        - bearerAuth:
            - read:attribution:aggregate
      parameters:
        - name: token
          in: path
          required: true
          description: The invite token
          schema:
            type: string
      responses:
        '204':
          description: Invite revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not authorized to revoke this invite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: oauth2
      description: OAuth 2.0 authorization with access tokens
      flows:
        authorizationCode:
          authorizationUrl: https://wefunder.com/oauth/authorize
          tokenUrl: https://wefunder.com/oauth/token
          scopes:
            read:public: Read public deal data (explore offerings); requires no user context
            read:profile: Read user profile information
            read:investments: Read user investment data
            read:campaigns: Read campaign information for companies you founded
            read:attribution:aggregate: Read aggregate attribution statistics (Tier 0)
            read:attribution:anonymized: Read anonymized attribution data (Tier 1 - requires approval)
            read:attribution:full: Read full attribution data with investor PII (Tier 2 - founders only)
            admin:attribution: Administrative access to attribution system (Tier 3 - Wefunder admins only)
            read:syndicates: View syndicates, members, deals, and portfolio
            write:syndicates: Manage members, update settings, operate on deals
            read:spvs: View partner SPVs, their invites, sessions, and investments
            write:spvs: Create and manage partner SPVs, invites, and investment sessions
            read:webhooks: View webhook subscriptions
            write:webhooks: Create, update, and delete webhook subscriptions
        clientCredentials:
          tokenUrl: https://wefunder.com/oauth/token
          scopes:
            read:public: Read public deal data. The only scope a server-side (client_credentials) key may hold — it acts as the app, with no user, so it can never read user-scoped data.
  parameters:
    campaign_id:
      name: campaign_id
      in: path
      required: true
      description: The fundraise/campaign ID
      schema:
        type: integer
      example: 789
    syndicate_id:
      name: syndicate_id
      in: path
      required: true
      description: The syndicate ID
      schema:
        type: integer
      example: 42
    member_id:
      name: member_id
      in: path
      required: true
      description: The member ID
      schema:
        type: string
      example: cr_123
    fundraise_id:
      name: fundraise_id
      in: path
      required: true
      description: The deal (fundraise) ID
      schema:
        type: integer
      example: 99
    start_date:
      name: start_date
      in: query
      description: |
        Filter results to attributions on or after this date. Format: YYYY-MM-DD.
        Defaults to 90 days ago if not specified.
      schema:
        type: string
        format: date
      example: '2025-01-01'
    end_date:
      name: end_date
      in: query
      description: |
        Filter results to attributions on or before this date. Format: YYYY-MM-DD.
        Defaults to today if not specified.
      schema:
        type: string
        format: date
      example: '2025-03-31'
    utm_source:
      name: utm_source
      in: query
      description: Filter by UTM source (e.g., "GoogleAds", "facebook", "Klaviyo")
      schema:
        type: string
      example: GoogleAds
    utm_campaign:
      name: utm_campaign
      in: query
      description: Filter by UTM campaign name
      schema:
        type: string
      example: winter_2025
    cursor:
      name: cursor
      in: query
      description: |
        Cursor-based pagination token. Use the `next_cursor` value from the previous response's
        `meta` object to retrieve the next page of results. Omit this parameter to retrieve the
        first page.
      schema:
        type: integer
      example: 12345
    webhook_id:
      name: webhook_id
      in: path
      required: true
      description: The webhook subscription ID
      schema:
        type: integer
      example: 123
    spv_id:
      name: id
      in: path
      required: true
      description: The SPV ID (prefixed, e.g. `spv_abc123`)
      schema:
        type: string
      example: spv_abc123
    invite_id:
      name: invite_id
      in: path
      required: true
      description: The invite ID (prefixed, e.g. `inv_xyz789`)
      schema:
        type: string
      example: inv_xyz789
    investment_session_id:
      name: session_id
      in: path
      required: true
      description: The investment session ID (prefixed, e.g. `is_abc123`)
      schema:
        type: string
      example: is_abc123
    partner_investment_id:
      name: id
      in: path
      required: true
      description: The investment ID (prefixed, e.g. `invt_def456`)
      schema:
        type: string
      example: invt_def456
    webhook_subscription_id:
      name: id
      in: path
      required: true
      description: The webhook subscription ID (prefixed, e.g. `whs_abc123`)
      schema:
        type: string
      example: whs_abc123
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        A unique client-generated key that makes a write request safe to retry. If a request
        is retried within 24 hours with the same key and body, the original result is returned
        instead of performing the operation again. Strongly recommended on all `POST` requests
        that create resources.
      schema:
        type: string
      example: acme-series-a-2025-001
  schemas:
    AttributedInvestmentListEnvelope:
      type: object
      properties:
        data:
          type: array
          description: |
            Returns AnonymizedAttribution or FullAttribution objects
            depending on detail_level and user permissions.
          items:
            oneOf:
              - $ref: '#/components/schemas/AnonymizedAttribution'
              - $ref: '#/components/schemas/FullAttribution'
        meta:
          allOf:
            - $ref: '#/components/schemas/PaginationMeta'
            - type: object
              properties:
                detail_level:
                  type: string
                  enum:
                    - anonymized
                    - full
                  description: The detail level returned in this response
                  example: anonymized
                can_view_full:
                  type: boolean
                  description: Whether the user can request full details
                  example: false
    AttributionCampaignSummary:
      type: object
      properties:
        id:
          type: integer
          example: 123
        company_name:
          type: string
          example: Example Name
        company_id:
          type: integer
          example: 123
        state:
          type: string
          example: active
        access_level:
          type: integer
          description: 1=anonymized, 2=detailed (future)
          example: 1
    AttributionCampaignSummaryListEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AttributionCampaignSummary'
    AttributionUser:
      type: object
      properties:
        id:
          type: integer
          example: 123
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: Example Name
    AttributionPartner:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          example: 123
        company_name:
          type: string
          example: Example Name
        website:
          type: string
          example: https://example.com
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
    AttributionCampaignAccess:
      type: object
      properties:
        id:
          type: integer
          example: 123
        company_name:
          type: string
          example: Example Name
        company_id:
          type: integer
          example: 123
