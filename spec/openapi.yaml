              schema:
                $ref: '#/components/schemas/Error'
  /syndicates/{syndicate_id}/deals/{fundraise_id}/close:
    post:
      tags:
        - Syndicate Deals
      summary: Close deal (requires intent)
      description: |
        Closing a deal is irreversible and requires human approval through the Intent system.
        This endpoint always returns 422 with a `use_intents` error directing you to
        `POST /v2/intents` with action `syndicates.close_deal`.
      operationId: closeSyndicateDeal
      security:
        - bearerAuth:
            - write:syndicates
      parameters:
        - $ref: '#/components/parameters/syndicate_id'
        - $ref: '#/components/parameters/fundraise_id'
      responses:
        '422':
          description: Use intents for this action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /syndicates/{syndicate_id}/deals/{fundraise_id}/finalize:
    post:
      tags:
        - Syndicate Deals
      summary: Finalize deal (requires intent)
      description: |
        Finalizing a deal triggers disbursement and is irreversible. It requires human approval
        through the Intent system. This endpoint always returns 422 with a `use_intents` error
        directing you to `POST /v2/intents` with action `syndicates.finalize_deal`.
      operationId: finalizeSyndicateDeal
      security:
        - bearerAuth:
            - write:syndicates
      parameters:
        - $ref: '#/components/parameters/syndicate_id'
        - $ref: '#/components/parameters/fundraise_id'
      responses:
        '422':
          description: Use intents for this action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /intents:
    post:
      tags:
        - Intents
      summary: Propose an intent
      description: |
        Propose a dangerous or irreversible action for human approval. Returns a `review_url`
        where a human must review the impact and approve before the action executes.

        The entity that proposes an intent can never approve it. Approval always happens
        on Wefunder's UI by a user with permission on the resource.

        See [Intents documentation](/concepts/intents) for the full pattern.
      operationId: createIntent
      security:
        - bearerAuth:
            - write:syndicates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action_name
                - resource_type
                - resource_id
              properties:
                action_name:
                  type: string
                  description: The action to perform
                  example: syndicates.close_deal
                  enum:
                    - syndicates.close_deal
                    - syndicates.finalize_deal
                    - syndicates.publish
                    - syndicates.remove_member
                    - syndicates.delete_draft
                resource_type:
                  type: string
                  example: Club
                  description: The model class name of the resource
                resource_id:
                  type: integer
                  example: 42
                params:
                  type: object
                  description: Action-specific parameters
                  example:
                    fundraise_id: 99
                idempotency_key:
                  type: string
                  description: Client-provided deduplication key. If a pending/executed intent exists with this key, the existing intent is returned.
                  example: close-acme-series-a
                requested_by_agent:
                  type: string
                  description: Human-readable name of the agent proposing the action
                  example: Claude via MCP
      responses:
        '201':
          description: Intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Duplicate idempotency key (returns existing intent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentEnvelope'
        '422':
          description: Invalid action or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
