    SyndicateMember:
      type: object
      description: JSON:API resource representing a syndicate member (ClubRole)
      properties:
        id:
          type: integer
          example: 123
        type:
          type: string
          example: syndicate_member
        attributes:
          type: object
          properties:
            user_id:
              type: integer
              nullable: true
