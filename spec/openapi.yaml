    Offering:
      type: object
      description: |
        A public offering (a fundraise), addressed by its `ofr_` external id. Returned by the
        Explore endpoints. Monetary fields are USD decimal strings — parse them as decimals, not
        floats.
      properties:
        id:
          type: string
          description: The offering's stable external id.
          example: ofr_yw3OhusvpfJP4Pk3wRYV1F2R
        type:
          type: string
          example: offering
        attributes:
          type: object
          properties:
            company_name:
              type: string
              example: ZeroBorder Self-Banking Centers
            tagline:
              type: string
              nullable: true
              example: Example tagline
            url:
              type: string
              description: The company's Wefunder profile URL.
              example: https://wefunder.com/zeroborder
            card_image_url:
              type: string
              nullable: true
              description: Absolute URL of the explore card image, or null if the company has none.
              example: https://uploads.wefunder.com/uploads/company/custom_card_photo/189517/large_card.jpg
            logo_url:
              type: string
              nullable: true
              description: Absolute URL of the company logo, or null if the company has none.
              example: https://uploads.wefunder.com/uploads/company/logo/189517/large_logo.png
            exemption:
              $ref: '#/components/schemas/Exemption'
            security_type:
              type: string
              description: The financial instrument (e.g. safe, convertible_note, equity, priced_round, fund).
              example: safe
            state:
              type: string
              example: open
            testing_the_waters:
              type: boolean
              description: |
                True for Testing-the-Waters rounds, which collect non-binding **reservations**, not
                investments. Use "reserve"/"reservation" copy for these, "invest"/"investment" otherwise.
              example: false
            funding_target:
              type: string
              nullable: true
              description: Funding target in USD, as a decimal string.
              example: '1000000'
            min_investment:
              type: string
              nullable: true
              description: Minimum investment in USD, as a decimal string.
              example: '100'
            amount_raised:
              type: string
              nullable: true
              description: Amount raised so far in USD, as a decimal string (hellbanned investors excluded).
              example: '642300'
            investor_count:
              type: integer
              nullable: true
              description: Distinct investor count (hellbanned investors excluded).
              example: 1203
            started_at:
              type: string
              format: date-time
              nullable: true
              example: '2025-03-01T12:00:00Z'
            closed_at:
              type: string
              format: date-time
              nullable: true
              example: '2025-03-01T12:00:00Z'
        company:
          type: object
          description: Reference to the parent company.
          properties:
            id:
              type: string
              description: The company's `co_` external id.
              example: co_8Kd0aB3xQ9k2vF8mNp1zT5wY
            type:
              type: string
              example: company
        etag:
          type: string
          description: |
            Content digest of this offering's public payload, for client-side change detection
            when polling.
          example: a1b2c3d4e5f6
    Exemption:
      type: object
      description: The offering's SEC exemption, in market vocabulary.
      properties:
        family:
          type: string
          enum:
            - reg_cf
            - reg_d
            - reg_a
            - reg_s
            - ecsp
          example: reg_cf
        subtype:
          type: string
          nullable: true
          description: Sub-type/flavor — `506b` or `506c` for the `reg_d` family, otherwise null.
          example: null
        label:
          type: string
          description: Human-readable label in normal market language.
          example: Reg CF
    User:
      type: object
      properties:
        id:
          type: integer
          example: 123
        type:
          type: string
          example: user
        attributes:
          type: object
          properties:
            email:
              type: string
              example: user@example.com
            username:
              type: string
              example: john_doe
            name:
              type: string
              example: John
            full_name:
              type: string
              example: John Doe
            bio:
              type: string
              nullable: true
              example: Entrepreneur and investor
            city:
              type: string
              nullable: true
              example: San Francisco
            country:
              type: string
              nullable: true
              example: USA
            avatar_url:
              type: string
              nullable: true
              example: https://example.com/avatar.jpg
            created_at:
              type: string
              format: date-time
              example: '2023-01-15T10:30:00Z'
            certified_at:
              type: string
              format: date-time
              nullable: true
              example: '2023-02-01T14:20:00Z'
    Investment:
      type: object
      properties:
        id:
          type: integer
          example: 456
        type:
          type: string
          example: investment
        attributes:
          type: object
          properties:
            amount:
              type: number
              format: float
              example: 1000
            state:
              type: string
              example: confirmed
            confirmed_at:
              type: string
              format: date-time
              nullable: true
              example: '2023-03-15T12:00:00Z'
            created_at:
              type: string
              format: date-time
              example: '2023-03-10T10:30:00Z'
            updated_at:
              type: string
              format: date-time
              example: '2023-03-15T12:00:00Z'
            fundraise_id:
              type: integer
              example: 789
            campaign:
              type: object
              nullable: true
              properties:
                id:
                  type: integer
                  example: 789
                company_name:
                  type: string
                  example: My Startup Inc.
                company_id:
                  type: integer
                  example: 101
    Campaign:
      type: object
      properties:
        id:
          type: integer
          example: 789
        type:
          type: string
          example: campaign
        attributes:
          type: object
          properties:
            state:
              type: string
              example: active
            company_id:
              type: integer
              example: 101
            company_name:
              type: string
              example: My Startup Inc.
            company_url:
              type: string
              nullable: true
              example: my-startup-inc
            created_at:
              type: string
              format: date-time
              example: '2023-01-10T09:00:00Z'
            updated_at:
              type: string
              format: date-time
              example: '2023-03-15T14:30:00Z'
            closed_at:
              type: string
              format: date-time
              nullable: true
              example: '2023-06-30T23:59:59Z'
            amount_raised:
              type: number
              format: float
              nullable: true
              example: 25000
            investor_count:
              type: integer
              example: 42
