        Returned on `422 Unprocessable Entity` when request fields fail validation.
        `details` is an array of per-field problems.
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              example: validation_error
            message:
              type: string
              example: Validation failed
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
