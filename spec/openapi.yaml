              type: string
              nullable: true
              description: The role the member was invited as
              example: admin
            syndicate_permission:
              type: string
              enum:
                - full_access
                - operator
              description: Permission level within the syndicate
            title:
              type: string
              nullable: true
              description: Custom title for the member
              example: Example title
            sort_order:
              type: integer
              nullable: true
              description: Display order position
              example: 5
            carry_percentage_override:
              type: string
              nullable: true
              example: '20.0'
              description: Override carry percentage for this member
            avatar_url:
              type: string
              nullable: true
              description: User profile photo URL (null for invitees without a user account)
              example: https://uploads.wefunder.com/uploads/user/avatar/456/large_photo.jpg
            bio:
              type: string
              nullable: true
              description: User bio with fallback chain (bio -> thesis -> about). Null for invitees without a user account.
              example: Example text
            city:
              type: string
              nullable: true
              description: User's city
              example: San Francisco
            country:
              type: string
              nullable: true
              description: User's country
              example: US
            last_activity_at:
              type: string
              format: date-time
              nullable: true
              description: ISO 8601 timestamp of user's last login. Null for invitees without a user account.
              example: '2025-03-01T12:00:00Z'
            profile_url:
              type: string
              nullable: true
              description: Relative path to user's profile (e.g. '/janedoe'). Null for invitees without a user account.
              example: /janedoe
            tags:
              type: array
              items:
                type: string
              description: '''Can help with'' tags from the user''s investor profile. Empty array for invitees.'
              example:
                - Fundraising
                - Product Strategy
            joined_at:
              type: string
              format: date-time
              description: ISO 8601 join date (alias for created_at)
              example: '2025-03-01T12:00:00Z'
            investment_total:
              type: string
              nullable: true
              description: Total amount invested in syndicate deals, in cents. String to avoid floating-point precision issues.
              example: '500000'
            deal_count:
              type: integer
              nullable: true
              description: Number of syndicate deals the member has invested in
              example: 2
            accredited:
              type: boolean
              description: |
                **Moderator-only.** Whether the user is an accredited investor.
                Only included when the requesting user is a manager/operator.
              example: true
            legal_name:
              type: string
              nullable: true
              description: |
                **Moderator-only.** Full legal name of the user.
                Only included when the requesting user is a manager/operator.
              example: Example Name
            starred:
              type: boolean
              description: |
                **Moderator-only.** Whether the current moderator has starred this member.
                Only included when the requesting user is a manager/operator.
              example: true
            private_tags:
              type: array
              items:
                type: string
              description: |
                **Moderator-only.** Labels assigned by moderators via ClubMemberLabel.
                Only included when the requesting user is a manager/operator.
              example:
                - VIP
                - Follow up
            created_at:
              type: string
              format: date-time
              example: '2025-03-01T12:00:00Z'
            updated_at:
              type: string
              format: date-time
              example: '2025-03-01T12:00:00Z'
